<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login do Usuário</title>

<link rel="stylesheet" href="/css/tokens/tokens.css">
<link rel="stylesheet" href="/css/loginUsuario.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Sistema de Votação</h1>

        <p>
            Informe sua matrícula para participar.
        </p>

        <form action="/usuario/votacoes" method="get">

            <input
                type="text"
                name="matricula"
                placeholder="Digite sua matrícula"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</div>

</body>
</html>
